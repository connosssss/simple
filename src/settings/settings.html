<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Hello World!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../index.css" />
</head>

<body class="overflow-y-auto m-0 p-0 bg-slate-950">
  <div class="w-full h-full p-6">
    <div class="text-2xl font-bold text-white mb-6">Settings</div>

    <div class="rounded-md p-4 mb-4 text-slate-200">
      <div class="text-lg font-semibold mb-4 border-b text-slate-200">Theme</div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="flex flex-col gap-2 text-sm">
            
            <div class="text-slate-100">Theme color</div>
          
          <div class="flex items-center gap-3">
            <input type="color" id="theme-color" class="" />
            <span id="theme-color-value" class=" text-xs uppercase"></span>
          </div>
        </div>

        <div class="flex flex-col gap-2 text-sm">
          <div class="text-slate-100">Accent color</div>
          <div class="flex items-center gap-3">
            <input type="color" id="theme-accent" class="theme-swatch" />
            <span id="theme-accent-value" class="text-xs uppercase"></span>
          </div>
        </div>
        
        <div class="flex flex-col gap-2 text-sm">
          <div class="text-slate-100">Text color</div>
          <div class="flex items-center gap-3">
            <input type="color" id="theme-text" class="theme-swatch" />
            <span id="theme-text-value" class="text-xs uppercase"></span>
          </div>
        </div>

      </div>

      <div class="flex flex-col gap-2 text-sm mt-4">
        <span class="">Overall opacity</span>
        <input type="range" id="theme-overall-opacity" min="0.02" max="1" step="0.02" class="w-full accent-slate-400" />
        <span id="theme-overall-opacity-value" class=" text-xs"></span>
      </div>

      <div class="flex flex-col gap-2 text-sm mt-4">
        <span class="">Accent opacity</span>
        <input type="range" id="theme-accent-opacity" min="0.02" max="1" step="0.02" class="w-full accent-slate-400" />
        <span id="theme-accent-opacity-value" class="text-xs"></span>
      </div>

    </div>

    <div class="rounded-lg p-4 mb-2">
      <div class="text-lg font-semibold text-white mb-4 border-b border-slate-600">Manually Hibernate Tabs</div>
      <div id="tabs-list" class="space-y-2"></div>
    </div>

    <div class="text-lg font-semibold text-white mb-4 border-b border-slate-600">Automatic Hibernation</div>

    <div class="flex flex-col gap-2 mb-6">
      <label for="close-after-select" class="text-slate-300 text-sm">Hibernate background tabs after:</label>
      <select id="close-after-select"
        class="bg-slate-900 text-white p-2 rounded-sm border border-slate-600 outline-none focus:outline-none">
        <option value="5">5 Minutes</option>
        <option value="10">10 Minutes</option>
        <option value="30">30 Minutes</option>
        <option value="60">1 Hour</option>
        <option value="120">2 Hours</option>
        <option value="240">4 Hours</option>
        <option value="480">8 Hours</option>
        <option value="1440">1 Day</option>
        <option value="-1">Never</option>
      </select>

      <label class="text-slate-300 text-sm mt-2">Default site on new tab:</label>
      <input class="w-full bg-slate-800 p-2 outline-none text-slate-100/80 text-sm rounded-sm selection:bg-slate-700" id="siteChoiceBar" onfocus="this.select()"/>

      <label class="text-slate-300 text-sm mt-2">Search engine:</label>
      <select id="search-engine-select"
        class="bg-slate-900 text-white p-2 rounded-sm border border-slate-600 outline-none focus:outline-none">
        <option value="https://www.google.com/search?q=">Google</option>
        <option value="https://search.brave.com/search?q=">Brave</option>
        <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
        <option value="https://www.bing.com/search?q=">Bing</option>
        <option value="https://search.yahoo.com/search?p=">Yahoo</option>
        
      </select>
    </div>

    <div class="border-b border-slate-600 mb-3 pb-2">
      <div class="flex items-center justify-between mb-2">
        <div class="text-lg font-semibold text-white">Cookies</div>
        <div class="flex gap-2 items-center flex-wrap justify-end">
          <input id="cookie-search" placeholder="Filter by domain or name..." class="bg-slate-800 text-white text-sm px-3 py-1 rounded-sm outline-none border border-slate-700 focus:border-slate-500 transition-colors w-48" />

          <button id="clear-third-party"
            class="bg-orange-900/50  text-orange-200 text-sm px-3 py-1 rounded-sm transition-all duration-100">
            Clear Trackers
          </button>

          <label class="flex flex-row items-center gap-1.5 bg-slate-800 text-white text-sm px-3 py-1 rounded-sm transition-all duration-100 cursor-pointer select-none">
            <input type="checkbox" id="block-trackers" checked class="w-3.5 h-3.5" />
            Block trackers
          </label>



          <button id="clear-all-cookies"
            class="bg-red-800/60  text-white text-sm px-3 py-1 rounded-sm transition-all duration-100">
            Clear All Cookies
          </button>


        </div>
      </div>
      <label class="flex items-center gap-2 cursor-pointer select-none w-fit">
        <input type="checkbox" id="toggle-third-party" class=" w-3.5 h-3.5" />
        <span class="text-slate-400 text-xs">Hide third-party tracker cookies</span>
      </label>
    </div>

    <div id="cookie-count" class="text-slate-500 text-xs mb-3"></div>
    <div id="cookies-list" class="space-y-1 mb-10">
      <div class="text-slate-500 text-sm">Loading cookies...</div>
    </div>

  </div>

  <script src="../theme.js"></script>
  <script type="module" src="./settingsUI.js"></script>
</body>

</html>
