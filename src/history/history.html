<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../index.css" />
</head>

<body class="overflow-y-auto m-0 p-0 bg-slate-950 text-slate-200">
  <div class="w-full h-full p-6">
    <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
      <div class="text-2xl font-bold text-white">History</div>
      <div class="flex gap-2">
        <input id="history-search" placeholder="Search history..." class="bg-slate-800 text-white text-sm px-3 py-1 rounded-sm outline-none border border-slate-700 focus:border-slate-500 transition-colors w-48" />
        <button id="clear-history-btn" class="bg-red-800/60 text-white text-sm px-3 py-1 rounded-sm transition-all duration-100">
          Clear History
        </button>
      </div>
    </div>

    <div id="history-list" class="space-y-1">
      <div class="text-slate-500 text-sm hidden" id="no-history-msg">No history found.</div>
    </div>
  </div>

  <script src="../theme.js"></script>
  <script type="module" src="./historyUI.js"></script>
</body>
</html>
