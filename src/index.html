<html>
  <head>

<head>
  <meta charset="UTF-8" />
  <title>Hello World!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./index.css" />
</head>

  <body class="overflow-hidden m-0 p-0 bg-transparent">
    <div class="theme-shell theme-border w-screen flex flex-row backdrop-blur-md h-[30px] items-center justify-center text-center border-b border-black/20" style="-webkit-app-region: drag;">
      <div id="window-title" class="theme-text text-md max-w-[70%] truncate"> simple</div>
    </div>

    <div class="theme-shell theme-border w-screen flex flex-row backdrop-blur-md h-[30px] items-center justify-start gap-2 border-b border-black/20">
      <div id="tabs-list" class="flex flex-row overflow-x-hidden gap-1 h-full items-end ml-1"></div>
      <button id="new-tab" class="theme-button w-6 h-6 flex items-center justify-center text-white rounded-md transition-all duration-100 mr-2 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </button>
    </div>

    <div id="stack-tabs-bar" class="theme-shell theme-border w-screen hidden flex-row backdrop-blur-md pt-1 h-[32px] items-end justify-start gap-1 border-b border-black/20">
      <div id="stack-tabs-list" class="flex flex-row overflow-x-hidden gap-1 h-[26px] items-end ml-1 "></div>
      <button id="new-stack-tab" class="theme-button w-6 h-6 flex items-center justify-center text-white rounded-md transition-all duration-100 mr-2 active:scale-95" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </button>
    </div>

    <div class="theme-shell theme-border w-screen flex flex-row backdrop-blur-md h-[40px] gap-1 items-center justify-start border-b border-black/20" id="address-bar-part">
      <div class="flex flex-row gap-1 ml-1">
        <button class="theme-button w-[2.0rem] h-[2.0rem] bg-slate-800/60 hover:bg-slate-700/70 text-white rounded-sm transition-all duration-100 flex items-center justify-center active:scale-95" id="back" title="Go back">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
          </svg>
        </button>
        <button class="theme-button w-[2.0rem] h-[2.0rem] bg-slate-800/60 hover:bg-slate-700/70 text-white rounded-sm transition-all duration-100 flex items-center justify-center active:scale-95" id="forward" title="Go forward">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
          </svg>
        </button>
        <button class="theme-button w-[2.0rem] h-[2.0rem] bg-slate-800/60 hover:bg-slate-700/70 text-white rounded-sm transition-all duration-100 flex items-center justify-center active:scale-95" id="refresh" title="Reload page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
        </button>
      </div>

      <div class="relative w-full h-[80%] flex items-center">
        <input class="theme-input w-full h-full px-2 outline-none text-sm rounded-sm selection:bg-slate-700/60" id="address-bar" onfocus="this.select()" />
        <div id="autocomplete-dropdown" class="absolute left-0 right-0 top-full mt-1 hidden z-50 rounded-sm border shadow-lg overflow-hidden theme-panel theme-border">

        </div>
      </div>

      <div id="find-bar" class="theme-panel hidden flex backdrop-blur-md rounded-sm p-[2px] gap-[2px]">
        <input id="find-input" class="theme-input text-sm px-2 py-1 rounded-sm outline-none" placeholder="Find in page" />
        <button id="find-close" class="theme-button-alt text-xs p-1 rounded flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" class="w-3 h-3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <button class="theme-button w-[2.0rem] h-[2.0rem] text-slate-400 hover:text-slate-200 rounded-sm transition-all duration-100 flex items-center justify-center active:scale-95"
        id="extensions-menu" title="Extensions">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-3.75-2.25v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25a2.25 2.25 0 0 1-2.25 2.25h-2.25A2.25 2.25 0 0 1 13.5 8.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
        </svg>
      </button>

      <button class="theme-button w-[2.0rem] h-[2.0rem] text-slate-400 hover:text-slate-200 rounded-sm transition-all duration-100 flex items-center justify-center active:scale-95"
        id="bookmark" title="Bookmark page">
      </button>
      
      <button class="theme-button w-[2.0rem] h-[2.0rem] text-slate-400 hover:text-slate-200 rounded-sm transition-all duration-100 mr-1 flex items-center justify-center active:scale-95" id="settings" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.991l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128c.332-.183.582-.495.645-.869L9.594 3.94ZM12.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
        </svg>
      </button>
    </div>

    <div id="bookmark-bar" class="theme-shell theme-border hidden w-screen flex-row items-center gap-1 px-1 h-[32px] border-b border-black/20 overflow-hidden">
      <div id="bookmark-bar-list" class="flex flex-row items-center gap-1 overflow-x-auto whitespace-nowrap w-full pr-1"></div>
    </div>

    <script src="./theme.js"></script>
    <script type="module" src="./renderer/app.js"></script>
  </body>
</html>
